<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualTrade Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-main: #0f141d;
            --bg-card: #171f2d;
            --bg-panel: #111827;
            --border: #2a3447;
            --text-main: #e6edf8;
            --text-muted: #9ba8c1;
            --accent: #4f9cff;
            --accent-hover: #3f89e6;
            --ok: #34d399;
            --err: #f87171;
            --alert: #4ade80;
            --alert-soft: rgba(74, 222, 128, 0.12);
            --log-row: rgba(255, 255, 255, 0.02);
            --log-row-alt: rgba(79, 156, 255, 0.07);
            --log-highlight: rgba(74, 222, 128, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top, #22304b 0%, transparent 45%),
                radial-gradient(circle at 85% 10%, rgba(79, 156, 255, 0.18), transparent 35%),
                var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1.25rem;
        }

        .container {
            width: min(900px, 100%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            display: grid;
            gap: 1rem;
        }

        .subtitle {
            margin: -0.35rem 0 0.2rem;
            color: var(--text-muted);
            font-size: 0.94rem;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            line-height: 1.2;
            letter-spacing: 0.2px;
        }

        .status {
            margin: 0;
            font-weight: 600;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .status.connected {
            color: var(--ok);
            border-color: rgba(52, 211, 153, 0.4);
            background: rgba(52, 211, 153, 0.1);
        }

        .status.disconnected {
            color: var(--err);
            border-color: rgba(248, 113, 113, 0.4);
            background: rgba(248, 113, 113, 0.1);
        }

        .control-panel {
            display: grid;
            grid-template-columns: minmax(160px, 1.1fr) minmax(160px, 1fr) auto;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
        }

        input,
        button {
            border-radius: 10px;
            font-size: 0.98rem;
            padding: 0.75rem 0.85rem;
            border: 1px solid var(--border);
        }

        input {
            background: var(--bg-panel);
            color: var(--text-main);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 156, 255, 0.22);
        }

        button {
            background: linear-gradient(180deg, #5aa9ff 0%, var(--accent) 100%);
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        button:hover {
            background: linear-gradient(180deg, #4a99f0 0%, var(--accent-hover) 100%);
            transform: translateY(-1px);
        }

        h3 {
            margin: 0;
            color: var(--alert);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .alerts-panel {
            display: grid;
            gap: 0.6rem;
            margin-top: 0.15rem;
            background: var(--alert-soft);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 12px;
            padding: 0.75rem;
        }

        .logs {
            background: var(--bg-panel);
            color: #d6e2f5;
            font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 320px;
            overflow-y: auto;
            padding: 0.65rem;
        }

        .logs div {
            padding: 0.35rem 0.45rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            line-height: 1.4;
            border-left: 3px solid rgba(79, 156, 255, 0.45);
            margin-bottom: 0.3rem;
            border-radius: 6px;
            background: var(--log-row);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .logs div:nth-child(odd) {
            border-left-color: rgba(79, 156, 255, 0.6);
            background: var(--log-row-alt);
        }

        .logs div:first-child {
            border-left-color: rgba(96, 165, 250, 0.95);
            background: rgba(96, 165, 250, 0.14);
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.3);
            color: #eff6ff;
            font-weight: 600;
        }

        .logs div.log-alert {
            border-left-color: rgba(248, 113, 113, 0.95);
            background: rgba(248, 113, 113, 0.14);
            box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.3);
            color: #fff1f2;
            font-weight: 700;
        }

        .logs div:hover {
            transform: translateX(2px);
            border-left-color: var(--ok);
        }

        .logs div.log-alert:hover {
            border-left-color: rgba(248, 113, 113, 0.95);
            background: rgba(248, 113, 113, 0.18);
        }

        .logs div:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .logs::-webkit-scrollbar {
            width: 9px;
        }

        .logs::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }

        .logs::-webkit-scrollbar-thumb {
            background: rgba(52, 211, 153, 0.45);
            border-radius: 10px;
        }

        .logs::-webkit-scrollbar-thumb:hover {
            background: rgba(52, 211, 153, 0.65);
        }

        @media (max-width: 760px) {
            .control-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 VirtualTrade Dashboard</h1>
    <p class="subtitle">Monitor subscriptions and receive real-time alert activity.</p>
    
    <div id="connectionStatus" class="status disconnected">🔴 Disconnected from Middleware</div>

    <div class="control-panel">
        <input type="text" id="tickerInput" placeholder="Ticker (e.g., AAPL)" required>
        <input type="number" id="priceInput" placeholder="Target Price (e.g., 150)" required>
        <button onclick="sendSubscription()">Subscribe to Alert</button>
    </div>

    <div class="alerts-panel">
        <h3>Live Alerts & System Logs</h3>
        <div class="logs" id="logBox"></div>
    </div>
</div>

<script>
    const DEFAULT_WS_ENDPOINTS = ["ws://10.2.1.3:8085", "ws://10.2.1.14:8085"];
    const ROUND_ROBIN_KEY = "virtualtrade_ws_rr_counter";
    const SUB_STORAGE_KEY = "virtualtrade_active_subs";
    const LAST_ENDPOINT_KEY = "virtualtrade_ws_last_endpoint";
    const RECONNECT_BASE_MS = 1500;
    const RECONNECT_MAX_MS = 15000;
    const FRESH_START_REQUESTED = (() => {
        const params = new URLSearchParams(window.location.search);
        const flag = params.get("fresh") || params.get("reset") || params.get("clean");
        return flag !== null && flag !== "0";
    })();
    const logBox = document.getElementById("logBox");
    const statusDiv = document.getElementById("connectionStatus");
    let ws = null;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    let endpointsCache = [];
    let endpointCursor = 0;

    if (FRESH_START_REQUESTED) {
        localStorage.removeItem(SUB_STORAGE_KEY);
        localStorage.removeItem(LAST_ENDPOINT_KEY);
        localStorage.removeItem(ROUND_ROBIN_KEY);
    }

    function parseEndpoints(raw) {
        if (!raw || !raw.trim()) {
            return [];
        }
        return raw.split(/[,\s;]+/).map((item) => item.trim()).filter(Boolean);
    }

    function resolveWsEndpoints() {
        const fromQuery = new URLSearchParams(window.location.search).get("ws");
        const fromWindow = Array.isArray(window.EXCHANGE_WS_ENDPOINTS) ? window.EXCHANGE_WS_ENDPOINTS.join(",") : "";
        const configured = parseEndpoints(fromQuery || fromWindow);
        return configured.length > 0 ? configured : DEFAULT_WS_ENDPOINTS.slice();
    }

    function pickRoundRobinEndpoint(endpoints) {
        const rawCounter = localStorage.getItem(ROUND_ROBIN_KEY);
        const current = Number.isFinite(Number(rawCounter)) ? Number(rawCounter) : 0;
        const idx = Math.abs(current) % endpoints.length;
        localStorage.setItem(ROUND_ROBIN_KEY, String(current + 1));
        return { endpoint: endpoints[idx], index: idx };
    }

    function selectEndpoint(initial) {
        endpointsCache = resolveWsEndpoints();
        if (!endpointsCache.length) {
            return null;
        }
        if (initial) {
            const lastEndpoint = localStorage.getItem(LAST_ENDPOINT_KEY);
            if (lastEndpoint && endpointsCache.includes(lastEndpoint)) {
                endpointCursor = endpointsCache.indexOf(lastEndpoint) + 1;
                return lastEndpoint;
            }
            const pick = pickRoundRobinEndpoint(endpointsCache);
            endpointCursor = pick.index + 1;
            return pick.endpoint;
        }
        const idx = Math.abs(endpointCursor) % endpointsCache.length;
        endpointCursor += 1;
        return endpointsCache[idx];
    }

    function loadStoredSubs() {
        try {
            const raw = localStorage.getItem(SUB_STORAGE_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
        } catch (err) {
            return [];
        }
    }

    function saveStoredSubs(list) {
        localStorage.setItem(SUB_STORAGE_KEY, JSON.stringify(list));
    }

    function removeStoredSub(rawSub) {
        const subs = loadStoredSubs();
        const filtered = subs.filter((item) => item !== rawSub);
        if (filtered.length !== subs.length) {
            saveStoredSubs(filtered);
        }
    }

    function replayStoredSubs() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            return;
        }
        const subs = loadStoredSubs();
        subs.forEach((sub) => ws.send(sub));
        if (subs.length) {
            logMsg("System: Re-sent " + subs.length + " saved subscription(s).");
        }
    }

    function scheduleReconnect() {
        if (reconnectTimer) {
            return;
        }
        const delay = Math.min(RECONNECT_BASE_MS * Math.pow(2, reconnectAttempts), RECONNECT_MAX_MS);
        reconnectAttempts += 1;
        logMsg("System: Reconnecting in " + Math.round(delay / 1000) + "s...");
        reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            connectWebSocket(false);
        }, delay);
    }

    function connectWebSocket(initial = false) {
        const selectedEndpoint = selectEndpoint(initial);
        if (!selectedEndpoint) {
            logMsg("System: No WebSocket endpoints configured.");
            return;
        }

        ws = new WebSocket(selectedEndpoint);
        logMsg("System: Routing this client session to " + selectedEndpoint);

        ws.onopen = function() {
            statusDiv.textContent = "🟢 Connected to Middleware (" + selectedEndpoint + ")";
            statusDiv.className = "status connected";
            logMsg("System: WebSocket connection established.");
            localStorage.setItem(LAST_ENDPOINT_KEY, selectedEndpoint);
            reconnectAttempts = 0;
            replayStoredSubs();
        };

        ws.onmessage = function(event) {
            // When Java sends an ALERT or ACK back to the browser
            const payload = String(event.data);
            const match = payload.match(/ALERT \[(.+?)\]/);
            if (match && match[1]) {
                removeStoredSub(match[1]);
            }
            logMsg("Server: " + payload);
        };

        ws.onclose = function() {
            statusDiv.textContent = "🔴 Disconnected from Middleware";
            statusDiv.className = "status disconnected";
            logMsg("System: Connection lost.");
            scheduleReconnect();
        };

        ws.onerror = function() {
            logMsg("System: WebSocket error on " + selectedEndpoint);
        };
    }

    function sendSubscription() {
        const ticker = document.getElementById("tickerInput").value.toUpperCase();
        const price = document.getElementById("priceInput").value;
        
        if (ticker && price) {
            const command = `SUB ${ticker} ${price}`;
            const stored = loadStoredSubs();
            if (!stored.includes(command)) {
                stored.push(command);
                saveStoredSubs(stored);
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                logMsg("System: Gateway not connected yet. Subscription queued.");
                return;
            }
            ws.send(command); // Send to Java Middleware
            logMsg("You: " + command);
            
            // Clear inputs
            document.getElementById("tickerInput").value = '';
            document.getElementById("priceInput").value = '';
        } else {
            alert("Please enter both a ticker and a target price.");
        }
    }

    function logMsg(message) {
        const p = document.createElement("div");
        p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        if (message.includes("ALERT")) {
            p.classList.add("log-alert");
        }
        logBox.prepend(p); // Add new logs to the top
    }

    if (FRESH_START_REQUESTED) {
        logMsg("System: Fresh start requested. Cleared saved subscriptions.");
    }
    connectWebSocket(true);
</script>

</body>
</html>
