<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualTrade Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-main: #0f141d;
            --bg-card: #171f2d;
            --bg-panel: #111827;
            --border: #2a3447;
            --text-main: #e6edf8;
            --text-muted: #9ba8c1;
            --accent: #4f9cff;
            --accent-hover: #3f89e6;
            --ok: #34d399;
            --err: #f87171;
            --alert: #4ade80;
            --alert-soft: rgba(74, 222, 128, 0.12);
            --log-row: rgba(255, 255, 255, 0.02);
            --log-row-alt: rgba(79, 156, 255, 0.07);
            --log-highlight: rgba(74, 222, 128, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top, #22304b 0%, transparent 45%),
                radial-gradient(circle at 85% 10%, rgba(79, 156, 255, 0.18), transparent 35%),
                var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1.25rem;
        }

        .container {
            width: min(900px, 100%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            display: grid;
            gap: 1rem;
        }

        .subtitle {
            margin: -0.35rem 0 0.2rem;
            color: var(--text-muted);
            font-size: 0.94rem;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            line-height: 1.2;
            letter-spacing: 0.2px;
        }

        .status {
            margin: 0;
            font-weight: 600;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .status.connected {
            color: var(--ok);
            border-color: rgba(52, 211, 153, 0.4);
            background: rgba(52, 211, 153, 0.1);
        }

        .status.disconnected {
            color: var(--err);
            border-color: rgba(248, 113, 113, 0.4);
            background: rgba(248, 113, 113, 0.1);
        }

        .control-panel {
            display: grid;
            grid-template-columns: minmax(160px, 1.1fr) minmax(160px, 1fr) auto;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
        }

        input,
        button {
            border-radius: 10px;
            font-size: 0.98rem;
            padding: 0.75rem 0.85rem;
            border: 1px solid var(--border);
        }

        input {
            background: var(--bg-panel);
            color: var(--text-main);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 156, 255, 0.22);
        }

        button {
            background: linear-gradient(180deg, #5aa9ff 0%, var(--accent) 100%);
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        button:hover {
            background: linear-gradient(180deg, #4a99f0 0%, var(--accent-hover) 100%);
            transform: translateY(-1px);
        }

        h3 {
            margin: 0;
            color: var(--alert);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .alerts-panel {
            display: grid;
            gap: 0.6rem;
            margin-top: 0.15rem;
            background: var(--alert-soft);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 12px;
            padding: 0.75rem;
        }

        .logs {
            background: var(--bg-panel);
            color: #d6e2f5;
            font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 320px;
            overflow-y: auto;
            padding: 0.65rem;
        }

        .logs div {
            padding: 0.35rem 0.45rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            line-height: 1.4;
            border-left: 3px solid rgba(79, 156, 255, 0.45);
            margin-bottom: 0.3rem;
            border-radius: 6px;
            background: var(--log-row);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .logs div:nth-child(odd) {
            border-left-color: rgba(79, 156, 255, 0.6);
            background: var(--log-row-alt);
        }

        .logs div:first-child {
            border-left-color: rgba(96, 165, 250, 0.95);
            background: rgba(96, 165, 250, 0.14);
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.3);
            color: #eff6ff;
            font-weight: 600;
        }

        .logs div.log-alert {
            border-left-color: rgba(248, 113, 113, 0.95);
            background: rgba(248, 113, 113, 0.14);
            box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.3);
            color: #fff1f2;
            font-weight: 700;
        }

        .logs div:hover {
            transform: translateX(2px);
            border-left-color: var(--ok);
        }

        .logs div.log-alert:hover {
            border-left-color: rgba(248, 113, 113, 0.95);
            background: rgba(248, 113, 113, 0.18);
        }

        .logs div:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .logs::-webkit-scrollbar {
            width: 9px;
        }

        .logs::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }

        .logs::-webkit-scrollbar-thumb {
            background: rgba(52, 211, 153, 0.45);
            border-radius: 10px;
        }

        .logs::-webkit-scrollbar-thumb:hover {
            background: rgba(52, 211, 153, 0.65);
        }

        @media (max-width: 760px) {
            .control-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 VirtualTrade Dashboard</h1>
    <p class="subtitle">Monitor subscriptions and receive real-time alert activity.</p>
    
    <div id="connectionStatus" class="status disconnected">🔴 Disconnected from Middleware</div>

    <div class="control-panel">
        <input type="text" id="tickerInput" placeholder="Ticker (e.g., AAPL)" required>
        <input type="number" id="priceInput" placeholder="Target Price (e.g., 150)" required>
        <button onclick="sendSubscription()">Subscribe to Alert</button>
    </div>

    <div class="alerts-panel">
        <h3>Live Alerts & System Logs</h3>
        <div class="logs" id="logBox"></div>
    </div>
</div>

<script>
    // Connect to the Java Middleware (which you will upgrade to host a WebSocket server)
    const ws = new WebSocket("ws://localhost:8085");
    const logBox = document.getElementById("logBox");
    const statusDiv = document.getElementById("connectionStatus");

    ws.onopen = function() {
        statusDiv.textContent = "🟢 Connected to Middleware";
        statusDiv.className = "status connected";
        logMsg("System: WebSocket connection established.");
    };

    ws.onmessage = function(event) {
        // When Java sends an ALERT or ACK back to the browser
        logMsg("Server: " + event.data);
    };

    ws.onclose = function() {
        statusDiv.textContent = "🔴 Disconnected from Middleware";
        statusDiv.className = "status disconnected";
        logMsg("System: Connection lost.");
    };

    function sendSubscription() {
        const ticker = document.getElementById("tickerInput").value.toUpperCase();
        const price = document.getElementById("priceInput").value;
        
        if (ticker && price) {
            const command = `SUB ${ticker} ${price}`;
            ws.send(command); // Send to Java Middleware
            logMsg("You: " + command);
            
            // Clear inputs
            document.getElementById("tickerInput").value = '';
            document.getElementById("priceInput").value = '';
        } else {
            alert("Please enter both a ticker and a target price.");
        }
    }

    function logMsg(message) {
        const p = document.createElement("div");
        p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        if (message.includes("ALERT")) {
            p.classList.add("log-alert");
        }
        logBox.prepend(p); // Add new logs to the top
    }
</script>

</body>
</html>
